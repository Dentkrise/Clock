<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock by myself</title>

  <style>
    body {
      background-image: url(Images/0x0.webp);
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .clock {
      width: 500px;
      height: 500px;
      border-radius: 250px;
      border: 10px solid black;
      background-color: white;

      position: relative;
    }

    .clock-face {
      position: relative;
    }

    .hand {
      position: absolute;
      top: 250px; /* Почему-то не работал top: 50% */
      transform: translateY(-50%);
      transform: rotate(90deg);
      transform-origin: 100%;

      transition: transform 0.05s;
      transition-timing-function: cubic-bezier(0.075, 0.82, 0.165, 1);
    }

    .second-hand {
      width: 45%;
      left: 5%;
      height: 6px;
      background-color: black;
    }

    .minute-hand {
      width: 40%;
      left: 10%;
      height: 8px;
      background-color: black;
    }

    .hour-hand {
      width: 35%;
      left: 15%;
      height: 10px;
      background-color: black;
    }

    .center-dot {
      width: 20px;
      height: 20px;
      background-color: red;
      border: 3px solid black;
      border-radius: 50%;

      top: 250px;
      left: 250px;
      transform: translate(-50%, -50%);
      position: absolute;

      z-index: 10;
    }

    .digital-clock {
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="clock">
    <div class="clock-face">
      <div class="hand second-hand"></div>
      <div class="hand minute-hand"></div>
      <div class="hand hour-hand"></div>
      <div class="center-dot"></div>
    </div>
  </div>

  <div class="digital-clock"></div>

  <script>
    const secondHand = document.querySelector.second-hand;
    secondHand.style.transform = rotate(${secondsDegrees}deg);

    const minutesHand = document.querySelector.minute-hand;
    minutesHand.style.transform = rotate(${minutesHand}deg);

    const hourHand = document.querySelector.hour-hand;

    function setTime() {
      const now = new Date();

      secondHand = now.getSeconds();
      const secondsDegrees = secondHand / 60 * 360 + 90;

      const minutes = now.getMinutes();
      const minsDegrees = minutes / 60 * 360 + 90;

      const hours = now.getHours();
      const hourDegrees = hours / 12 * 360 + 90;
    }

    setInterval(setTime, 1000);
    setTime();

    const digitalTime = document.querySelector.digital-clock;
  </script>
</body>
</html>
