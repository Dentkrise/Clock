<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock by myself</title>

  <style>
    body{
      background-image: url(Images/0x0.webp);
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;

      display: flex;
      flex-direction: column;
      gap: 2rem;
      align-items: center;
      justify-content: center;

      min-height: 100vh;
      margin: 0px;
    }

    .clock{
      width: 500px;
      height: 500px;
      border-radius: 250px;
      border: 10px solid black;
      background-color: white;

      position: relative;
    }

    .clock-face{
      width: 100%;
      height: 100%;
      position: relative;
    }

    .hand{
      position: absolute;
      top: 50%;
      transform: rotate(90deg);
      transform-origin: 100%;

      transition: transform 0.05s;
      transition-timing-function: cubic-bezier(0.075, 0.82, 0.165, 1);
    }

    .second-hand{
      width: 45%;
      left: 5%;
      height: 6px;
      margin-top: -3px;
      
      background-color: black;
    }

    .minute-hand{
      width: 40%;
      left: 10%;
      height: 8px;
      margin-top: -4px;

      background-color: black;
    }
    
    .hour-hand{
      width: 35%;
      left: 15%;
      height: 10px;
      background-color: black;
      margin-top: -5px;
    }
    .center-dot{
      width: 20px;
      height: 20px;
      background-color: red;
      border: 3px solid black;
      border-radius: 50%;


      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      position: absolute;

      z-index: 10;
    }

    .digital-clock{

      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 5em;
      width: 300px;
      height: 100px;
      background-color: black;
      color: red;
      border: 5px solid rgb(83, 16, 16);
    }
  </style>
</head>
<body>

  <div class="clock">
    <div class="clock-face">
      <div class="hand second-hand"></div>
      <div class="hand minute-hand"></div>
      <div class="hand hour-hand"></div>
      <div class="center-dot"></div>
    </div>
  </div>
  <div class="digital-clock"></div>



  <script>
    const secondHand = document.querySelector(".second-hand");

    const minutesHand = document.querySelector(".minute-hand");

    const hourHand = document.querySelector(".hour-hand");

    const digitalTime = document.querySelector(".digital-clock");

    console.log(secondHand);
    console.log(minutesHand);
    console.log(hourHand);
    console.log(digitalTime);
    
    
    

    
    

    
    
    function setTime() {
      const now = new Date();

      const seconds = now.getSeconds();

      if(seconds === 0){
        secondHand.style.transition = "none";
      } else {
        secondHand.style.transition = '';
      }

      const secondsDegrees = seconds / 60 * 360 + 90;
      secondHand.style.transform = `rotate(${secondsDegrees}deg)`;

      const minutes = now.getMinutes();
      const minsDegrees = minutes / 60 * 360 + seconds * 0.1  + 90;
      minutesHand.style.transform = `rotate(${minsDegrees}deg)`;

      const hours = now.getHours();
      const hourDegrees = hours / 12 * 360 + minutes * 0.5 + 90;
      hourHand.style.transform = `rotate(${hourDegrees}deg)`;

      const digitalHours = String(now.getHours()).padStart(2, "0");
      const digitalMinutes = String(now.getMinutes()).padStart(2, "0");
      const digitalSeconds = String(now.getSeconds()).padStart(2, "0");

      digitalTime.textContent = `${digitalHours}:${digitalMinutes}:${digitalSeconds}`;
    }

    setInterval (setTime, 1000);
    setTime();

    

    
  </script>
</body>
</html>
